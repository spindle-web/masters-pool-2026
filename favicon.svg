<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#145c3e"/>
      <stop offset="1" stop-color="#083020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9e076"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)" stroke="#d4af37" stroke-width="2"/>
  <!-- Golf flag pole -->
  <line x1="24" y1="14" x2="24" y2="50" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Flag -->
  <path d="M 24 14 L 46 20 L 24 26 Z" fill="url(#gold)" stroke="#8a6d1f" stroke-width="0.8"/>
  <!-- Green/hole -->
  <ellipse cx="32" cy="52" rx="16" ry="3" fill="#2a7a57" opacity="0.6"/>
  <!-- Golf ball -->
  <circle cx="40" cy="48" r="3.5" fill="#fdf8e8" stroke="#8a8f96" stroke-width="0.6"/>
  <circle cx="39" cy="47" r="1" fill="#ffffff" opacity="0.8"/>
</svg>
